name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  checks:
    name: Checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # pnpm v11 unified action: installs pnpm + Node (from devEngines.runtime)
      # + project deps (frozen in CI) in one step.
      - name: Setup pnpm, Node & install
        uses: pnpm/setup@5d160c5bc68a09337ad0d5654e237e03253b5879 # v1.0.0
        with:
          cache: true

      # Parallel steps (GitHub Actions, 2026-06-25): one checkout + install, then
      # lint and typecheck run concurrently on the same runner.
      # https://github.blog/changelog/2026-06-25-actions-steps-can-now-be-run-in-parallel/
      - name: Lint
        id: lint
        run: pnpm exec biome ci .
        background: true

      - name: Typecheck
        id: typecheck
        run: pnpm typecheck
        background: true

      - name: Wait for lint and typecheck
        wait-all:

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: checks
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup pnpm, Node & install
        uses: pnpm/setup@5d160c5bc68a09337ad0d5654e237e03253b5879 # v1.0.0

      - name: Build
        run: pnpm build

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HUSKY: 0
        run: pnpm release
